<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7d84a" />
    <title>Whoopee Cam</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="camera-stage" aria-label="Camera motion detector">
        <video id="camera" autoplay playsinline muted></video>
        <canvas id="motionCanvas" width="96" height="72" aria-hidden="true"></canvas>
        <div class="scan-frame" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="status-bar">
          <div>
            <p class="eyebrow">Whoopee Cam</p>
            <h1 id="statusText">Ready to arm</h1>
          </div>
          <div class="meter" aria-label="Motion level" style="display: none;">
            <span id="meterFill"></span>
          </div>
        </div>
      </section>
      
      <section class="controls" aria-label="Controls">
        <div style="display: flex; flex-direction: row; align-items: center; gap: 12px;">
          <button id="armButton" class="primary-button" type="button" style="width: 100%;">
          <span id="armLabel">Start camera</span>
          </button>
          <button class="primary-button" style="background-color: white;">
            <img src="camera-rotate-solid-full.svg" alt="" id="rotate-camera" style="height:35px;">
          </button>
        </div>
        <div style="display: flex; flex-direction: row; gap: 5px;">
          <span>Random sound:</span>
          <label class="switch">
            <input type="checkbox" id="random-sound" checked>
            <span class="slider round"></span>
          </label>

          <span>Video recording:</span>
          <label class="switch">
            <input type="checkbox" id="record-video">
            <span class="slider round"></span>
          </label>
        </div>
        
        <div style="display: flex; flex-direction: row; gap: 5px;">
          <button type="button" id="removeSound" class="primary-button mb10">Remove sound</button>
          <button type="button" id="removeAllSound" class="primary-button mb10" >Remove all</button>
        </div>


        <div class="sound-pad mb10">
          <!-- <button class="sound-choice is-active" type="button" data-sound="classic">Classic</button>
          <button class="sound-choice" type="button" data-sound="squeak">Squeak</button>
          <button class="sound-choice" type="button" data-sound="chaos">Chaos</button> -->
        </div>

        <details>
        <summary>Add sounds</summary>
          <div id="dropZone" class="drop-zone mb10">
            <label class="import-button" for="soundImport">
              <span>Import sounds</span>
              <input id="soundImport" type="file" accept="audio/*" multiple />
            </label>
          </div>
          <div style="padding: 5px;">
            <label class="import-button" for="import-standard-sounds">
              <span>Import standard sounds</span>
              <input id="import-standard-sounds"/>
            </label>
          </div>
          <p>Audio Recording</p>
          <button id="start-audio-recording" class="primary-button">Record</button>
          <button id="stop-audio-recording" class="primary-button">Stop</button>
        </details>

        <details>
          <summary>Camera</summary>
          <div class="camera-switch" aria-label="Camera direction" style="display: none;">
            <button class="camera-choice" type="button" data-facing="user">Front</button>
            <button class="camera-choice is-active" type="button" data-facing="environment">Back</button>
          </div>
          <p id="cameraHint" class="camera-hint" style="display: none;">Checking camera access...</p>

          <div class="control-row">
            <label for="sensitivity">Sensitivity</label>
            <input id="sensitivity" type="range" min="0" max="100" value="100" />
          </div>

          <div class="control-row">
            <label for="cooldown">Cooldown</label>
            <input id="cooldown" type="range" min="0" max="10000" step="1000" value="3000" />
          </div>

          <section class="recordings" aria-label="Recorded clips">
            <div class="recordings-header">
              <h2>Clips</h2>
              <span id="recordingStatus">None yet</span>
            </div>
            <div id="recordingList" class="recording-list"></div>
          </section>
      </details>  
      
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
